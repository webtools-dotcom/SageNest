name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate route + sitemap consistency
        run: npm run check:sitemap

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
